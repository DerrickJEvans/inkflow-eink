name: 🛠️ Build custom E-Ink OS Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Install system packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y kpartx unzip wget xz-utils coreutils

      - name: 💾 Download official Raspberry Pi OS Bookworm Lite
        run: |
          # Fetch the latest official 64-bit Lite image link
          wget -O pi-os-lite.img.xz https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2024-10-28/2024-10-22-raspios-bookworm-arm64-lite.img.xz
          xz -d pi-os-lite.img.xz

      - name: 🔧 Mount Image & Inject Customizations
        run: |
          IMAGE_FILE="pi-os-lite.img"
          
          # Create loopback device
          LOOP_DEV=$(sudo losetup -f --show "$IMAGE_FILE")
          echo "Loop device created at: $LOOP_DEV"
          
          # Map partitions reliably with kpartx
          sudo kpartx -av "$LOOP_DEV"
          LOOP_NAME=$(basename "$LOOP_DEV")
          
          # Create directories for mounting
          mkdir -p mnt/boot mnt/root
          
          # Mount Boot (FAT) and Root (Ext4) partitions using mapper devices
          sudo mount "/dev/mapper/${LOOP_NAME}p1" mnt/boot
          sudo mount "/dev/mapper/${LOOP_NAME}p2" mnt/root
          
          # --- Injection Phase ---
          # 1. Copy repository files into /opt/trmnl-pi-server (excluding loopback images and git metadata)
          sudo mkdir -p mnt/root/opt/trmnl-pi-server
          sudo rsync -av --exclude="node_modules" --exclude="*.img" --exclude="*.img.xz" --exclude=".git" --exclude=".github" --exclude="cache" --exclude="mnt" ./ mnt/root/opt/trmnl-pi-server/
          
          # 2. Inject our bootstrap script
          sudo cp mnt/root/opt/trmnl-pi-server/client/inkflow-bootstrap.sh mnt/root/usr/local/bin/inkflow-bootstrap
          sudo chmod +x mnt/root/usr/local/bin/inkflow-bootstrap
          
          # 2.5. Inject default inkflow-setup.txt configuration template into the FAT boot partition
          # We use sed to strip the leading whitespaces so it is valid YAML but unindented in the file
          cat <<'EOF' | sed 's/^[[:space:]]*//' | sudo tee mnt/boot/inkflow-setup.txt
          # ==============================================================================
          # INKFLOW OS E-INK BOOT CONFIGURATION FILE
          # ==============================================================================
          # Customize your role and display size natively inside Windows!
          # By default, this image is configured to boot as the Main Dashboard Server.
          
          ROLE=server                  # REQUIRED: Set to 'server' or 'client'
          DEVICE_NAME=Living Room Pi   # OPTIONAL: Friendly name of your screen
          
          # ==============================================================================
          # CLIENT-MODE CONFIGURATION DIRECTIVES (Commented out by default)
          # ==============================================================================
          # To configure this machine as a Standalone E-Ink Client, uncomment and fill out 
          # the parameters below:
          # ------------------------------------------------------------------------------
          # ROLE=client
          # SERVER_IP=192.168.1.122      # REQUIRED: The local IP of your main server Pi
          # SCREEN_TYPE=4in26            # REQUIRED: Your display size: '4in26', '7in5', '4in2', '2in9'
          # DEVICE_NAME=Kitchen E-Ink    # OPTIONAL: Friendly name reported to the server
EOF
          
          # 3. Inject our systemd bootstrap service
          # We use sed to strip the leading whitespaces so systemd doesn't fail to parse it
          cat <<'EOF' | sed 's/^[[:space:]]*//' | sudo tee mnt/root/etc/systemd/system/inkflow-bootstrap.service
          [Unit]
          Description=Inkflow OS E-Ink Firstboot Auto-Provisioner
          After=network-online.target
          Wants=network-online.target
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/inkflow-bootstrap
          RemainAfterExit=yes
          
          [Install]
          WantedBy=multi-user.target
EOF
          
          # 4. Enable bootstrap service to execute on next boot
          sudo ln -s /etc/systemd/system/inkflow-bootstrap.service mnt/root/etc/systemd/system/multi-user.target.wants/inkflow-bootstrap.service
          
          # Cleanup mounts safely
          sudo umount mnt/boot
          sudo umount mnt/root
          sudo kpartx -d "$LOOP_DEV"
          sudo losetup -d "$LOOP_DEV"

      - name: 📦 Compress and Package custom E-Ink OS
        run: |
          mv pi-os-lite.img inkflow.img
          # Compress using multi-threading and an efficient compression level to prevent timeouts/OOMs
          xz -T 0 -3 inkflow.img

      - name: 💾 Save build image as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkflow
          path: |
            inkflow.img.xz
            inkflow-imager-repo.json
          retention-days: 7

      - name: 🚀 Publish release packages
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            inkflow.img.xz
            inkflow-imager-repo.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
